name: easy_compressor_example
description: Example app demonstrating the easy_compressor plugin.
publish_to: "none"

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  easy_compressor:
    path: ../
  file_picker: ^8.0.0
  video_player: ^2.9.1
  chewie: ^1.8.5
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  gal: ^2.3.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
