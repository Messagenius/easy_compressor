name: easy_compressor
description: >-
  Cross-platform video compression plugin using native APIs (no FFmpeg).
  Supports Android, iOS, macOS, and Windows with a simple 0-100 quality
  parameter.
version: 1.0.0
repository: https://github.com/KHKikani/easy_compressor
issue_tracker: https://github.com/KHKikani/easy_compressor/issues

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.19.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.example.easy_compressor
        pluginClass: EasyCompressorPlugin
      ios:
        pluginClass: EasyCompressorPlugin
      macos:
        pluginClass: EasyCompressorPlugin
      windows:
        pluginClass: EasyCompressorPluginCApi

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

topics:
  - video
  - compression
  - media
  - video-processing
  - cross-platform
